<!DOCTYPE html>
<html>
<head>
  <title>My Orders – EVERLUSH CUSTOMS</title>
</head>
<body>

<h1>EVERLUSH CUSTOMS 🌸</h1>
<h3>My Orders</h3>

<input id="phone" placeholder="Enter phone number">
<button onclick="loadOrders()">View Orders</button>

<ul id="orders"></ul>

<script>
function loadOrders() {
  const phone = document.getElementById('phone').value;
  const ordersEl = document.getElementById('orders');
  ordersEl.innerHTML = "";

  fetch(`/orders/${phone}`)
    .then(res => res.json())
    .then(data => {
      if (!data.length) {
        ordersEl.innerHTML = "<li>No orders found</li>";
        return;
      }

      data.forEach(o => {
        ordersEl.innerHTML += `
          <li>
            <b>Order #${o.id}</b><br>
            Items: ${o.items}<br>
            Total: ₹${o.total}<br>
            Status: ${o.status}<br>
            Cancel Request: ${o.cancel_request || "No"}<br>
            ${
              o.status === "Pending" && o.cancel_request === "No"
              ? `<button onclick="cancelOrder(${o.id})">Request Cancel</button>`
              : ""
            }
            <hr>
          </li>
        `;
      });
    });
}

function cancelOrder(orderId) {
  fetch(`/order/cancel/${orderId}`, { method: "POST" })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        alert("Cancel request sent");
        loadOrders();
      }
    });
}
</script>

</body>
</html>
